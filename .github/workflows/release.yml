name: Release

on:
  push:
    tags: ["v*"]

# One release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # Create GitHub Release and upload assets
  packages: write # Push to GHCR

jobs:
  # ── Gate: tests must pass before anything is published ─────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist placeholder
        run: mkdir -p dist && touch dist/.keep

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -count=1

  # ── Build SvelteKit frontend once, share the dist/ artifact ────────────────
  build-frontend:
    name: Build frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      # dist/ ends up at repo root (svelte.config.js sets outDir: ../dist)
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── Cross-compile Go binaries for every target platform ────────────────────
  build-binaries:
    name: Binary (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Restore the pre-built frontend so go:embed finds dist/
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="alertlens-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "$BINARY" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: alertlens-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 1

  # ── Create GitHub Release and attach all binaries + checksums ──────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: binaries/
        run: sha256sum * | tee checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/alertlens-linux-amd64
            binaries/alertlens-linux-arm64
            binaries/alertlens-darwin-amd64
            binaries/alertlens-darwin-arm64
            binaries/alertlens-windows-amd64.exe
            binaries/checksums.txt

  # ── Build and push multi-arch Docker image to GHCR ─────────────────────────
  # Runs in parallel with build-binaries (Dockerfile handles the frontend build itself).
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulation for cross-platform builds (linux/arm64 on amd64 runners)
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags:  vX.Y.Z  |  vX.Y  |  vX  |  latest
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/alertlens/alertlens
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          # GitHub Actions cache speeds up layer reuse across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Package and push Helm chart to GHCR OCI registry ───────────────────────
  # Runs in parallel with build-binaries and docker.
  helm:
    name: Helm chart
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Strip the leading "v" from the tag (v0.1.0 → 0.1.0) for the chart version.
      - name: Extract chart version
        run: echo "CHART_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package Helm chart
        run: |
          helm package chart/alertlens \
            --version "${{ env.CHART_VERSION }}" \
            --app-version "${{ env.CHART_VERSION }}"

      - name: Push Helm chart to GHCR
        run: |
          helm push "alertlens-${{ env.CHART_VERSION }}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/chart
