name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist placeholder
        run: mkdir -p dist && touch dist/.keep

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -count=1 -cover

  build-check:
    name: Build check (frontend + Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci-check" \
            -o /dev/null .
