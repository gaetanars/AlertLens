name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist placeholder
        run: mkdir -p dist && touch dist/.keep

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -count=1 -cover

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run check
        working-directory: web

      - name: Unit tests
        run: npm test
        working-directory: web

  lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Create dist placeholder
        run: mkdir -p dist && touch dist/.keep

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  build-and-e2e:
    name: Build & E2E
    needs: [test, lint, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci-check" \
            -o alertlens .

      - name: Verify binary
        run: test -x ${{ github.workspace }}/alertlens

      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps

      - name: Run E2E
        run: cd e2e && npx playwright test
        env:
          ALERTLENS_BIN: ${{ github.workspace }}/alertlens

  docker-dev:
    name: Publish dev image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-e2e
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/alertlens/alertlens:dev
          build-args: VERSION=dev+${{ github.sha }}
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,mode=max,scope=docker-dev
