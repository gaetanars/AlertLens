name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist placeholder
        run: mkdir -p dist && touch dist/.keep

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -count=1 -cover

  build-and-e2e:
    name: Build & E2E
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci-check" \
            -o alertlens .

      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps

      - name: Start AlertLens
        run: |
          ./alertlens -config config.example.yaml &

      - name: Run E2E
        run: |
          cd e2e
          npx playwright test
