global:
  scrape_interval:     15s
  evaluation_interval: 15s

# Send alerts to the local Alertmanager instance
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/rules/*.yml

# ─── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: alertlens
    static_configs:
      - targets: [alertlens:9000]
    metrics_path: /metrics
