version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    staticcheck:
      checks: ["all"]
  exclusions:
    rules:
      # Tests: errcheck noise on test helpers is acceptable.
      - path: "_test\\.go"
        linters: [errcheck]
      # Deferred Close calls: standard Go idiom; Close errors on deferred
      # cleanup are almost always unactionable.
      - linters: [errcheck]
        text: "Error return value of .*(Close|Sync|Remove|Flush).*is not checked"
